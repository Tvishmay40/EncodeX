version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile.fastapi
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile.next
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
